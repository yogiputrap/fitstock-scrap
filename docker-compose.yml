services:
  fitstock-wa:
    build: .
    container_name: fitstock-wa
    restart: unless-stopped
    environment:
      TARGET_URL: ${TARGET_URL:-https://fitstock.id/#sec-spil}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-10000}
      WA_SENDER: ${WA_SENDER}
      WA_TARGET: ${WA_TARGET}
      HTTP_PORT: ${HTTP_PORT:-3000}
      NOTIFY_ON_STARTUP: ${NOTIFY_ON_STARTUP:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATA_DIR: /data
    ports:
      - "${HOST_PORT:-3100}:3000"
    volumes:
      - fitstock-data:/data
    # Shared memory bump helps Chromium
    shm_size: "1gb"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  fitstock-data:
